<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resultado Clínico · RehabPro</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .page-hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: 3rem 1.5rem 2.5rem;
      border-bottom:1px solid rgba(13,148,136,0.2);
    }
    .page-hero .inner { max-width:860px; margin:0 auto; }
    .page-hero h1 { font-size:clamp(1.4rem,3vw,2rem); font-weight:700; color:white; margin-bottom:0.4rem; }
    .page-hero p  { color:rgba(255,255,255,0.5); font-size:0.875rem; }

    main { padding:2.5rem 1.5rem 5rem; }
    .result-wrap { max-width:860px; margin:0 auto; }

    /* empty state */
    .empty-state {
      text-align:center; padding:5rem 2rem;
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r);
    }
    .empty-state .icon {
      width:72px;height:72px; border-radius:1.25rem;
      background:rgba(13,148,136,0.1);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 1.5rem;
    }
    .empty-state h2 { font-size:1.35rem; font-weight:700; margin-bottom:0.75rem; }
    .empty-state p  { color:var(--muted); margin-bottom:1.75rem; }

    /* result header card */
    .result-header-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      box-shadow:0 4px 24px rgba(11,31,58,0.08);
      overflow:hidden; margin-bottom:1.5rem;
      animation:fadeUp 0.4s ease both;
    }

    .result-top {
      display:grid; grid-template-columns:auto 1fr;
      gap:1.75rem; padding:2rem;
      align-items:center;
      background:linear-gradient(135deg, rgba(13,148,136,0.06), rgba(11,31,58,0.02));
      border-bottom:1px solid var(--border);
    }

    .k-badge {
      width:110px; height:110px;
      border-radius:1.25rem;
      background:linear-gradient(135deg, var(--navy), var(--navy2));
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      box-shadow:0 8px 24px rgba(11,31,58,0.25);
      flex-shrink:0;
    }
    .k-badge .k-label { font-size:0.62rem; font-weight:600; color:var(--teal); text-transform:uppercase; letter-spacing:0.1em; }
    .k-badge .k-val   { font-family:'DM Mono',monospace; font-size:3.5rem; font-weight:500; color:white; line-height:1; }

    .result-meta .comp { font-size:1.4rem; font-weight:700; line-height:1.3; margin-bottom:0.4rem; }
    .result-meta .sub  { font-size:0.875rem; color:var(--muted); font-family:'DM Mono',monospace; }

    .result-pills {
      display:flex; flex-wrap:wrap; gap:0.6rem;
      padding:1.25rem 2rem;
      border-bottom:1px solid var(--border);
    }

    .result-conclusion {
      padding:1.5rem 2rem;
      font-size:0.95rem; line-height:1.8; color:var(--muted);
    }
    .result-conclusion strong { color:var(--text); font-weight:600; }

    /* info cards grid */
    .info-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:1.25rem;
      margin-bottom:1.5rem; animation:fadeUp 0.4s ease both; animation-delay:0.1s;
    }

    .info-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:1.5rem;
      box-shadow:0 2px 12px rgba(11,31,58,0.06);
    }
    .info-card-title {
      font-size:0.7rem; font-weight:600; text-transform:uppercase;
      letter-spacing:0.08em; color:var(--muted); margin-bottom:1rem;
      display:flex; align-items:center; gap:0.5rem;
    }
    .info-card-title::before {
      content:''; width:8px; height:8px; border-radius:2px;
    }
    .info-card-title.teal::before { background:var(--teal); }
    .info-card-title.blue::before { background:var(--blue); }
    .info-card-title.purple::before { background:#8b5cf6; }
    .info-card-title.amber::before { background:var(--amber); }

    .info-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:0.6rem 0; border-bottom:1px solid var(--border); font-size:0.875rem;
    }
    .info-row:last-child { border-bottom:none; padding-bottom:0; }
    .info-row .lbl { color:var(--muted); }
    .info-row .val { font-weight:600; }

    /* score bar visual */
    .score-visual {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:1.5rem 2rem;
      margin-bottom:1.5rem;
      animation:fadeUp 0.4s ease both; animation-delay:0.15s;
    }
    .score-visual-title { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:1.25rem; }
    .k-levels { display:flex; gap:0.5rem; }
    .k-lv {
      flex:1; padding:0.75rem 0.5rem; border-radius:0.75rem;
      text-align:center; font-family:'DM Mono',monospace;
      border:1.5px solid var(--border); transition:all 0.2s;
    }
    .k-lv .kn { font-size:1.1rem; font-weight:500; display:block; }
    .k-lv .kr { font-size:0.65rem; color:var(--muted); display:block; margin-top:0.2rem; line-height:1.3; }
    .k-lv.active { background:var(--navy); border-color:var(--teal); }
    .k-lv.active .kn { color:white; }
    .k-lv.active .kr { color:var(--teal); }

    /* action btns */
    .action-row {
      display:flex; gap:1rem; flex-wrap:wrap;
      animation:fadeUp 0.4s ease both; animation-delay:0.2s;
    }
    .action-row .btn { flex:1; justify-content:center; min-width:180px; }

    @media print {
      nav, .page-hero, .action-row, footer, .no-print { display:none !important; }
      .result-header-card, .info-card, .score-visual { box-shadow:none; border:1px solid #ddd; }
      main { padding-top:0; }
    }

    @media (max-width:600px) {
      .result-top { grid-template-columns:1fr; text-align:center; }
      .k-badge { margin:0 auto; }
      .info-grid { grid-template-columns:1fr; }
      .k-levels { flex-wrap:wrap; }
      .k-lv { min-width:80px; }
      .action-row .btn { min-width:100%; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-brand">
    <svg class="nav-logo" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#0d9488"/>
      <path d="M18 8v20M8 18h20" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <circle cx="18" cy="18" r="6" stroke="white" stroke-width="2" fill="none"/>
    </svg>
    <span class="nav-brand-text">
      <span class="top">Hospital · MFR</span>
      <span class="btm">RehabPro</span>
    </span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Início</a></li>
    <li><a href="ferramenta.html">Ferramenta</a></li>
    <li><a href="resultado.html" class="active">Resultado</a></li>
  </ul>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="inner">
    <h1>Resultado da avaliação clínica</h1>
    <p id="hero-data">—</p>
  </div>
</div>

<main>
  <div class="result-wrap" id="result-wrap">
    <!-- preenchido por JS -->
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-links">
    <a href="index.html">Início</a>
    <a href="ferramenta.html">Ferramenta</a>
    <a href="resultado.html">Resultado</a>
  </div>
  <p><strong>RehabPro · Medicina Física e Reabilitação</strong></p>
  <p>Ferramenta de apoio à decisão clínica · Uso exclusivo por profissionais de saúde</p>
</footer>

<script>
function pill(text, cls) {
  return `<span class="pill ${cls}">${text}</span>`;
}

const KLASSES = [
  {nivel:"K0", desc:"Sem marcha"},
  {nivel:"K1", desc:"Marcha doméstica"},
  {nivel:"K2", desc:"Comunitária limitada"},
  {nivel:"K3", desc:"Comunitária"},
  {nivel:"K4", desc:"Alta atividade"}
];

document.addEventListener("DOMContentLoaded", () => {
  const raw  = sessionStorage.getItem("rehabDados");
  const wrap = document.getElementById("result-wrap");

  if (!raw) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <h2>Nenhuma avaliação encontrada</h2>
        <p>Preencha o formulário de avaliação para obter o resultado clínico.</p>
        <a href="ferramenta.html" class="btn btn-primary">Ir para a ferramenta →</a>
      </div>`;
    return;
  }

  const d = JSON.parse(raw);

  // Hero subtitle
  const heroData = document.getElementById("hero-data");
  if (heroData) heroData.textContent = `${d.nome !== "—" ? d.nome + " · " : ""}${d.data}`;

  const progTxt  = d.progTxt;
  const riscoTxt = d.riscoTxt;
  const progCls  = d.progCls;
  const riscoCls = d.riscoCls;

  // K-levels visual
  const kLevels = KLASSES.map(kl =>
    `<div class="k-lv ${kl.nivel === d.k ? 'active' : ''}">
       <span class="kn">${kl.nivel}</span>
       <span class="kr">${kl.desc}</span>
     </div>`
  ).join("");

  wrap.innerHTML = `
    <!-- MAIN RESULT CARD -->
    <div class="result-header-card">
      <div class="result-top">
        <div class="k-badge">
          <span class="k-label">K-Level</span>
          <span class="k-val">${d.k}</span>
        </div>
        <div class="result-meta">
          <div class="comp">${d.componente}</div>
          <div class="sub">${d.nivelLabel} · AMPnoPRO ${d.ampScore}/39</div>
        </div>
      </div>
      <div class="result-pills">
        ${pill(`Nível ${d.k}`, "pill-teal")}
        ${pill(`AMPnoPRO ${d.ampScore}/39`, "pill-blue")}
        ${pill(`Prognóstico: ${progTxt}`, progCls)}
        ${pill(`Risco de queda: ${riscoTxt}`, riscoCls)}
      </div>
      <div class="result-conclusion">
        <p>
          Paciente classificado como <strong>${d.k}</strong> (${d.nivelLabel}),
          AMPnoPRO <strong>${d.ampScore}/39</strong> — ${d.kDesc}.
          Prognóstico <strong>${progTxt}</strong>,
          risco de queda <strong>${riscoTxt}</strong>.
          Componente recomendado: <strong>${d.componente}</strong>.
        </p>
      </div>
    </div>

    <!-- K-LEVEL VISUAL -->
    <div class="score-visual">
      <div class="score-visual-title">Posicionamento no espectro funcional</div>
      <div class="k-levels">${kLevels}</div>
    </div>

    <!-- INFO GRID -->
    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-title teal">Dados do paciente</div>
        <div class="info-row"><span class="lbl">Nome</span><span class="val">${d.nome}</span></div>
        <div class="info-row"><span class="lbl">Idade</span><span class="val">${d.idade} anos</span></div>
        <div class="info-row"><span class="lbl">Sexo</span><span class="val">${d.sexo}</span></div>
        <div class="info-row"><span class="lbl">Peso</span><span class="val">${d.peso} kg</span></div>
        <div class="info-row"><span class="lbl">Altura</span><span class="val">${d.altura} cm</span></div>
        <div class="info-row"><span class="lbl">Nível de amputação</span><span class="val">${d.nivelLabel}</span></div>
      </div>

      <div class="info-card">
        <div class="info-card-title blue">Pontuação AMPnoPRO</div>
        <div class="info-row">
          <span class="lbl">Score total</span>
          <span class="val" style="font-family:'DM Mono',monospace;font-size:1.25rem;color:var(--teal2)">${d.ampScore}<span style="font-size:0.85rem;color:var(--muted)">/39</span></span>
        </div>
        <div class="info-row"><span class="lbl">K-Level</span><span class="val">${d.k} — ${d.kDesc}</span></div>
        <div class="info-card-title amber" style="margin-top:1rem">Perfil de risco</div>
        <div class="info-row"><span class="lbl">Prognóstico</span><span class="val">${pill(progTxt, progCls)}</span></div>
        <div class="info-row"><span class="lbl">Risco de queda</span><span class="val">${pill(riscoTxt, riscoCls)}</span></div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="action-row no-print">
      <button onclick="window.print()" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir relatório
      </button>
      <a href="ferramenta.html" class="btn btn-primary">
        Nova avaliação →
      </a>
    </div>
  `;
});
</script>
</body>
</html>
